<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palenque Go Sivar | Ecosistema Orgánico Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap');

        body, html { 
            margin: 0; padding: 0; overflow: hidden; 
            background: #05070a; font-family: 'Outfit', sans-serif; 
        }
        
        #canvas-container { position: fixed; top: 0; left: 0; outline: none; z-index: 1; }

        /* Capa de Interfaz */
        #ui-layer {
            position: relative;
            z-index: 10;
            pointer-events: none;
            height: 100vh;
            width: 100vw;
        }
        .interactive { pointer-events: auto; }

        /* Estilo de Vidrio Esmerilado (Glassmorphism) */
        .glass-card {
            background: rgba(10, 15, 25, 0.7);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Panel Lateral */
        #info-panel {
            transform: translateX(100%);
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #info-panel.active { transform: translateX(0); }

        /* Gradiente Sivar */
        .text-sivar-gradient {
            background: linear-gradient(135deg, #f59e0b, #d97706, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Animaciones de la Landing */
        #landing-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: 100%;
            transition: opacity 1s ease, transform 1s ease;
        }

        .hero-title {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -0.05em;
            color: white;
            margin-bottom: 1.5rem;
        }

        .btn-explore {
            background: white;
            color: black;
            padding: 1.5rem 4rem;
            border-radius: 999px;
            font-weight: 900;
            font-size: 1.25rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.2);
        }

        .btn-explore:hover {
            transform: scale(1.05) translateY(-5px);
            background: #10b981;
            color: white;
            box-shadow: 0 20px 40px rgba(16, 185, 129, 0.4);
        }

        /* Botón de Salida */
        #btn-exit-3d {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s ease;
        }
        #btn-exit-3d.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* Efecto de Flash de Transición */
        #transition-overlay {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 150;
            pointer-events: none;
            opacity: 0;
        }
    </style>
</head>
<body>

    <div id="transition-overlay"></div>
    <canvas id="canvas-container"></canvas>

    <div id="btn-exit-3d" class="interactive">
        <button onclick="exitExperience()" class="group flex items-center gap-4 bg-black/50 backdrop-blur-md border border-white/20 text-white px-6 py-4 rounded-2xl hover:bg-red-600 transition-all">
            <i class="fas fa-sign-out-alt text-xl group-hover:-translate-x-1 transition-transform"></i>
            <div class="text-left">
                <p class="text-[10px] font-black tracking-widest uppercase opacity-60">Volver al Menú</p>
                <p class="font-bold">SALIR DEL 3D</p>
            </div>
        </button>
    </div>

    <main id="ui-layer">

        <section id="landing-content" class="interactive p-6">
            <div class="max-w-6xl">
                <p class="text-emerald-500 font-bold tracking-[0.5em] text-xs mb-6 uppercase">
                    El Salvador Reef Tech & Ecosistema Orgánico
                </p>
                <h1 class="hero-title">
                    PALENQUE <br> <span class="text-sivar-gradient italic">GO SIVAR</span>
                </h1>
                <p class="text-gray-400 text-xl md:text-2xl mb-12 font-light max-w-3xl mx-auto leading-relaxed">
                    Digitaliza tu negocio en la costa salvadoreña. Fusionamos la calidez del <span class="text-white">bambú ancestral</span> 
                    con la potencia de la <span class="text-white">economía digital</span>.
                </p>
                <button onclick="startExperience()" class="btn-explore">
                    Explorar la Costa Digital <i class="fas fa-arrow-right ml-3"></i>
                </button>
            </div>
        </section>

        <aside id="info-panel" class="fixed right-6 top-6 bottom-6 w-full max-w-xl glass-card rounded-[3rem] p-12 flex flex-col interactive">
            <button onclick="closeInfo()" class="absolute top-10 right-10 text-gray-500 hover:text-white transition group">
                <i class="fas fa-times text-2xl group-hover:rotate-90 transition-transform"></i>
            </button>
            
            <div id="content-area" class="mt-10">
                <div class="flex items-center gap-4 mb-4">
                    <i id="domo-icon" class="fas fa-store text-yellow-500 text-3xl"></i>
                    <span id="domo-tag" class="text-emerald-400 text-xs font-bold tracking-[0.3em] uppercase">Módulo de Crecimiento</span>
                </div>
                <h2 id="domo-title" class="text-6xl font-black text-white mt-2 mb-8 tracking-tighter italic">Cargando...</h2>
                <div id="domo-body" class="text-gray-300 leading-relaxed space-y-6 text-xl font-light">
                    </div>
            </div>

            <div class="mt-auto pt-10 space-y-4">
                <button onclick="implementBenefit()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-6 rounded-3xl transition-all text-xl shadow-2xl">
                    Implementar este beneficio
                </button>
                <div class="flex gap-4">
                    <button onclick="prevCabin()" class="flex-1 bg-white/5 border border-white/10 text-white py-5 rounded-2xl hover:bg-white/10 transition-all flex items-center justify-center gap-3">
                        <i class="fas fa-chevron-left text-xs"></i> Anterior
                    </button>
                    <button onclick="nextCabin()" class="flex-1 bg-white/5 border border-white/10 text-white py-5 rounded-2xl hover:bg-white/10 transition-all flex items-center justify-center gap-3">
                        Siguiente <i class="fas fa-chevron-right text-xs"></i>
                    </button>
                </div>
            </div>
        </aside>

    </main>

    <div id="modal-video-implement" class="fixed inset-0 z-[200] hidden flex items-center justify-center">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-2xl" onclick="closeVideoModal()"></div>
        <div class="relative w-full max-w-5xl p-6 interactive">
            <button onclick="closeVideoModal()" class="absolute -top-12 right-0 text-white/50 hover:text-white flex items-center gap-2">
                CERRAR <i class="fas fa-times"></i>
            </button>
            <div class="aspect-video bg-gray-900 rounded-[3rem] overflow-hidden border border-white/10 flex flex-col items-center justify-center shadow-2xl">
                <i class="fas fa-play-circle text-8xl text-emerald-500 mb-6 animate-pulse"></i>
                <h3 class="text-white font-black text-4xl uppercase tracking-tighter" id="video-title-display">Cargando Módulo...</h3>
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/RGBELoader.js"></script>

<script>
    // --- MOTOR 3D: TU LÓGICA ORIGINAL RECUPERADA ---
    let scene, camera, renderer, luciérnagas, cabañasGroup, controls, currentCabinIndex = -1;
    let ground, raycaster, mouse, isExperienceStarted = false;

    const cabañasData = [
        { title: "Reservas Playeras", desc: "Motor de reservas integrado para tus cabañas o tours. Confirmación instantánea y gestión de disponibilidad en tiempo real.", color: 0xD4AF37, icon: "fa-calendar-check" },
        { title: "Sivar Payments", desc: "Acepta Bitcoin (Chivo), tarjetas locales e internacionales. Liquidación rápida para mantener tu flujo de caja.", color: 0x10b981, icon: "fa-bitcoin-sign" },
        { title: "Eco-Logística", desc: "Coordina suministros y transporte de turistas de forma eficiente. Rutas optimizadas para la costa.", color: 0x60a5fa, icon: "fa-shuttle-van" },
        { title: "Marketplace Turístico", desc: "Expone tu negocio ante miles de viajeros buscando experiencias auténticas en El Salvador.", color: 0xf87171, icon: "fa-map-marked-alt" },
        { title: "Análisis de Ocupación", desc: "Inteligencia de datos para predecir temporadas altas y ajustar tus precios dinámicamente.", color: 0xa78bfa, icon: "fa-chart-line" }
    ];

// Archivo de fondo 360 grados (puede ser nuevo_fondo.jpg, nuevo_fondo.png o nuevo_fondo.hdr)
const fondoFileName = 'nuevo_fondo.png';

    function init3D() {
        scene = new THREE.Scene();
        // scene.fog = new THREE.FogExp2(0x05070a, 0.02); // Desactivamos la niebla negra para poder ver el paisaje de fondo

        camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 40); // Posición inicial lejana

        renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas-container'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        renderer.outputEncoding = THREE.sRGBEncoding;

        // CONTROLES ORIGINALES
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enabled = false; 
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 5;
        controls.maxDistance = 50;
        controls.maxPolarAngle = Math.PI / 2.1;

        // ILUMINACIÓN ORIGINAL
        const ambientLight = new THREE.AmbientLight(0x404040, 0.8);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xff9e42, 0.9);
        sunLight.position.set(10, 20, 10);
        sunLight.castShadow = true;
        scene.add(sunLight);

        // ================================================================
        // 1. CARGAMOS EL AMBIENTE Y EL TERRENO (mangaone_valley_road_1k.glb)
        // ================================================================
        let loader;
        const isHDR = fondoFileName.toLowerCase().endsWith('.hdr');
        if (isHDR) {
            loader = new THREE.RGBELoader();
        } else {
            loader = new THREE.TextureLoader();
        }

        const bgUrl = 'static/3d/' + fondoFileName + '?v=2';

        loader.load(bgUrl, function(texture) {
            texture.mapping = THREE.EquirectangularReflectionMapping;
            
            if (!isHDR) {
                texture.encoding = THREE.sRGBEncoding;
            }

            scene.background = texture;
            scene.environment = texture;

            // Cargar el terreno de colinas mangaone
            const gltfLoader = new THREE.GLTFLoader();
            gltfLoader.load('static/3d/mangaone_valley_road_1k.glb', function(gltf) {
                const terreno = gltf.scene;
                terreno.scale.set(2, 2, 2);
                terreno.position.set(0, -2, 0);
                terreno.traverse(function(child) {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                scene.add(terreno);
            }, undefined, function(error) {
                console.error("Error cargando el terreno GLB:", error);
            });
        }, undefined, function(error) {
            console.error("Error cargando el cielo HDR:", error);
        });

        // LUCIÉRNAGAS ORIGINALES
        const fireflyGeometry = new THREE.BufferGeometry();
        const fireflyMaterial = new THREE.PointsMaterial({ color: 0x10b981, size: 0.1, transparent: true, blending: THREE.AdditiveBlending });
        const fireflyVertices = [];
        for(let i=0; i<1500; i++) {
            fireflyVertices.push((Math.random()-0.5)*100, Math.random()*30, (Math.random()-0.5)*100);
        }
        fireflyGeometry.setAttribute('position', new THREE.Float32BufferAttribute(fireflyVertices, 3));
        luciérnagas = new THREE.Points(fireflyGeometry, fireflyMaterial);
        scene.add(luciérnagas);

        // CABAÑAS (TU GEOMETRÍA ORIGINAL: BAMBÚ Y PAJA)
        cabañasGroup = new THREE.Group();
        const radius = 18;
        cabañasData.forEach((data, i) => {
            const angle = (i / cabañasData.length) * Math.PI * 2;
            const cabaña = new THREE.Group();

            // Paredes (Bambú - Cilindro Wireframe como pediste)
            const walls = new THREE.Mesh(
                new THREE.CylinderGeometry(2, 2.2, 3.5, 12),
                new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.8, wireframe: true })
            );
            walls.castShadow = true;
            cabaña.add(walls);

            // Techo (Paja - Cono)
            const roof = new THREE.Mesh(
                new THREE.ConeGeometry(3, 3, 8),
                new THREE.MeshStandardMaterial({ color: 0x4d3319, roughness: 1 })
            );
            roof.position.y = 3.2;
            roof.castShadow = true;
            cabaña.add(roof);

            // Luz interior original
            const pointLight = new THREE.PointLight(data.color, 0, 15);
            pointLight.position.set(0, 1, 0);
            cabaña.add(pointLight);

            cabaña.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
            cabaña.rotation.y = -angle + Math.PI/2;
            cabaña.userData = { ...data, light: pointLight };

            cabañasGroup.add(cabaña);
        });
        scene.add(cabañasGroup);

        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector2();

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        if (controls.enabled) controls.update();
        if(luciérnagas) {
            luciérnagas.rotation.y += 0.0003;
            luciérnagas.material.opacity = 0.5 + Math.sin(Date.now() * 0.001) * 0.3;
        }
        renderer.render(scene, camera);
    }

    // --- TRANSICIONES Y MEJORAS DE LANDING ---

    function startExperience() {
        // Flash de transición
        gsap.to("#transition-overlay", {
            opacity: 1, duration: 0.4, yoyo: true, repeat: 1, ease: "power2.inOut"
        });

        // Ocultar landing
        gsap.to("#landing-content", {
            opacity: 0, y: -50, scale: 0.9, duration: 0.8, ease: "power4.inOut",
            onComplete: () => {
                document.getElementById('landing-content').style.display = 'none';
                document.getElementById('btn-exit-3d').classList.add('visible');
                controls.enabled = true;
                isExperienceStarted = true;
            }
        });

        // Movimiento cinemático de cámara
        gsap.to(camera.position, {
            x: 0, y: 5, z: 28, duration: 2, ease: "expo.inOut"
        });
    }

    function exitExperience() {
        isExperienceStarted = false;
        closeInfo();
        
        document.getElementById('btn-exit-3d').classList.remove('visible');
        const landing = document.getElementById('landing-content');
        landing.style.display = 'flex';
        
        gsap.to(landing, { opacity: 1, y: 0, scale: 1, duration: 1, ease: "power3.out" });
        
        // Volver cámara a posición de landing
        gsap.to(camera.position, { x: 0, y: 10, z: 40, duration: 2, ease: "expo.inOut" });
        
        controls.enabled = false;
        cabañasGroup.children.forEach(c => c.userData.light.intensity = 0);
        gsap.to(controls.target, { x: 0, y: 0, z: 0, duration: 1 });
    }

    // --- INTERACCIÓN ORIGINAL (TU LÓGICA INTACTA) ---

    window.addEventListener('click', (event) => {
        if(!isExperienceStarted) return;

        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(cabañasGroup.children, true);

        if (intersects.length > 0) {
            let clickedObj = intersects[0].object;
            while(clickedObj.parent && clickedObj.parent !== cabañasGroup) {
                clickedObj = clickedObj.parent;
            }
            showCabañaInfo(clickedObj);
        }
    });

    function showCabañaInfo(cabañaGroup) {
        currentCabinIndex = cabañasGroup.children.indexOf(cabañaGroup);
        const data = cabañaGroup.userData;

        // Reset luces y encender la elegida
        cabañasGroup.children.forEach(c => c.userData.light.intensity = 0);
        data.light.intensity = 8;

        // Zoom a la cabaña
        const targetPos = cabañaGroup.position.clone().normalize().multiplyScalar(12);
        gsap.to(camera.position, {
            x: targetPos.x, y: 2, z: targetPos.z, duration: 1.5, ease: "power3.inOut",
            onUpdate: () => camera.lookAt(cabañaGroup.position),
            onComplete: () => {
                controls.target.copy(cabañaGroup.position);
            }
        });

        // UI original
        document.getElementById('domo-title').innerText = data.title;
        document.getElementById('domo-title').style.color = `#${data.color.toString(16)}`;
        document.getElementById('domo-body').innerHTML = `<p>${data.desc}</p>`;
        document.getElementById('domo-icon').className = `fas ${data.icon} text-3xl`;
        document.getElementById('domo-icon').style.color = `#${data.color.toString(16)}`;
        document.getElementById('info-panel').classList.add('active');
    }

    function closeInfo() {
        document.getElementById('info-panel').classList.remove('active');
        cabañasGroup.children.forEach(c => c.userData.light.intensity = 0);
        gsap.to(controls.target, { x: 0, y: 0, z: 0, duration: 1 });
        gsap.to(camera.position, { x: 0, y: 5, z: 28, duration: 1.5 });
    }

    function nextCabin() {
        if (currentCabinIndex === -1) return;
        let nextIndex = (currentCabinIndex + 1) % cabañasGroup.children.length;
        showCabañaInfo(cabañasGroup.children[nextIndex]);
    }

    function prevCabin() {
        if (currentCabinIndex === -1) return;
        let prevIndex = (currentCabinIndex - 1 + cabañasGroup.children.length) % cabañasGroup.children.length;
        showCabañaInfo(cabañasGroup.children[prevIndex]);
    }

    function implementBenefit() {
        if (currentCabinIndex === -1) return;
        const data = cabañasGroup.children[currentCabinIndex].userData;
        document.getElementById('video-title-display').innerText = data.title;
        document.getElementById('modal-video-implement').classList.remove('hidden');
    }

    function closeVideoModal() {
        document.getElementById('modal-video-implement').classList.add('hidden');
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init3D();
</script>
</body>
</html>
